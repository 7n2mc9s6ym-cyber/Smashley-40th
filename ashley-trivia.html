<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smashley 40th Birthday Trivia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background-color: #f5f1ed;
            padding: 20px;
            color: #1a1a1a;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #faf8f5;
            border: 3px solid #1a1a1a;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid #1a1a1a;
            padding-bottom: 20px;
        }

        h1 {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 2px;
            margin: 10px 0;
            font-style: italic;
        }

        .subtitle {
            font-size: 16px;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .score-tracker {
            background-color: #d4af37;
            padding: 15px 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 25px;
            font-weight: bold;
            font-size: 18px;
        }

        .question-number {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .question-text {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            background-color: #fff;
            border: 2px solid #1a1a1a;
            padding: 15px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            line-height: 1.4;
        }

        .option:hover:not(.disabled) {
            background-color: #f0f0f0;
            transform: translateX(5px);
        }

        .option.correct {
            background-color: #90EE90;
            border-color: #228B22;
            font-weight: bold;
        }

        .option.incorrect {
            background-color: #FFB6C6;
            border-color: #C41E3A;
        }

        .option.disabled {
            cursor: not-allowed;
        }

        .image-option {
            padding: 0 !important;
            background-color: transparent;
            overflow: hidden;
        }

        .image-option img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            display: block;
            border: 2px solid #1a1a1a;
        }

        .image-option.correct img {
            border: 4px solid #228B22;
        }

        .image-option.incorrect img {
            border: 4px solid #C41E3A;
        }

        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct-feedback {
            background-color: #E8F5E9;
            color: #2E7D32;
            border: 2px solid #4CAF50;
        }

        .feedback.incorrect-feedback {
            background-color: #FFEBEE;
            color: #C62828;
            border: 2px solid #F44336;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #1a1a1a;
            background-color: #d4af37;
            color: #1a1a1a;
            font-weight: bold;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background-color: #1a1a1a;
            color: #d4af37;
            transform: scale(1.05);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: scale(1);
        }

        .results-screen {
            display: none;
            text-align: center;
        }

        .results-screen.show {
            display: block;
        }

        .final-score {
            font-size: 48px;
            font-weight: 900;
            color: #d4af37;
            margin: 20px 0;
        }

        .results-message {
            font-size: 18px;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 24px;
            }

            .question-text {
                font-size: 16px;
            }

            .option {
                font-size: 13px;
                padding: 12px 15px;
            }

            .image-option img {
                height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div style="font-size: 32px; margin-bottom: 10px;">🍾 ✨ 🍾</div>
            <h1>SMASHLEY'S 40th</h1>
            <div class="subtitle">Birthday Trivia Challenge</div>
        </div>

        <div class="score-tracker">
            Score: <span id="score">0</span> / 11
        </div>

        <div id="trivia-content">
            <div class="question-number" id="question-number">Question 1 of 11</div>
            <div class="question-text" id="question-text"></div>
            <div class="options" id="options"></div>
            <div class="feedback" id="feedback"></div>
            <div class="button-group">
                <button id="next-btn" onclick="nextQuestion()" disabled>Next Question</button>
            </div>
        </div>

        <div class="results-screen" id="results-screen">
            <h2 style="font-size: 28px; margin-bottom: 20px;">🎉 Trivia Complete! 🎉</h2>
            <div class="final-score" id="final-score"></div>
            <div class="results-message" id="results-message"></div>
            <button onclick="location.reload()" style="margin-top: 20px;">Play Again</button>
        </div>
    </div>

    <script>
        const questions = [
            {
                question: "What did Anne call Ashley during her toast at the engagement party?",
                options: ["Her margarita to go girl", "The life of the party", "Party animal Ashley", "Margarita queen"],
                correct: 0,
                isImageQuestion: false
            },
            {
                question: "What was Ashley's soccer number?",
                options: ["23", "7", "15", "9"],
                correct: 2,
                isImageQuestion: false
            },
            {
                question: "What song was playing when Ashley delivered Avery?",
                options: ["Partition by Beyoncé", "Get Low by Lil Jon", "No Scrubs by TLC", "Yeah! by Usher"],
                correct: 1,
                isImageQuestion: false
            },
            {
                question: "What two honors/awards did Ashley win during the same semester in college?",
                options: ["Homecoming Queen & Greek Life Award", "Dean's List & Chi Omega Frank the Tank Award", "All-Star & MVP", "President's Award & Athlete of the Year"],
                correct: 1,
                isImageQuestion: false
            },
            {
                question: "Who did Chris get her a cameo from?",
                options: ["Abby Wambach", "Brandi Chastain", "Mia Hamm", "Alex Morgan"],
                correct: 1,
                isImageQuestion: false
            },
            {
                question: "What was the name of the second ski run she ever did with Chris?",
                options: ["Blue run", "Sidewinder", "Powder day", "Black diamond"],
                correct: 1,
                isImageQuestion: false
            },
            {
                question: "Which hamster did Ashley's mom send Chris when he asked what Bell looked like?",
                options: [
                    "https://images.pexels.com/photos/416978/pexels-photo-416978.jpeg?auto=compress&cs=tinysrgb&w=400",
                    "https://images.pexels.com/photos/5632399/pexels-photo-5632399.jpeg?auto=compress&cs=tinysrgb&w=400",
                    "https://7n2mc9s6ym-cyber.github.io/Smashley-40th/tmp.gif",
                    "https://images.pexels.com/photos/7974367/pexels-photo-7974367.jpeg?auto=compress&cs=tinysrgb&w=400"
                ],
                correct: 2,
                isImageQuestion: true
            },
            {
                question: "What was the name of Ashley's bachelorette party?",
                options: ["Bach Bash", "Smashley's Night", "Smash Bash", "The Final Party"],
                correct: 2,
                isImageQuestion: false
            },
            {
                question: "What's Ashley's favorite noise?",
                options: ["Laughter", "Champagne popping", "Waves crashing", "Wind chimes"],
                correct: 1,
                isImageQuestion: false
            },
            {
                question: "How many countries has Ashley been to?",
                options: ["25", "32", "38", "42"],
                correct: 2,
                isImageQuestion: false
            },
            {
                question: "What does Ashley share in common with a whale?",
                options: ["They both love water", "Her cervix is made of the same material as a whale's blowhole", "They both eat krill", "They both travel great distances"],
                correct: 1,
                isImageQuestion: false
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let answered = false;

        function loadQuestion() {
            const question = questions[currentQuestion];
            document.getElementById('question-number').textContent = `Question ${currentQuestion + 1} of 11`;
            document.getElementById('question-text').textContent = question.question;
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';

            if (question.isImageQuestion) {
                question.options.forEach((imageUrl, index) => {
                    const imgButton = document.createElement('div');
                    imgButton.className = 'option image-option';
                    imgButton.style.marginBottom = '10px';
                    imgButton.style.borderRadius = '8px';
                    
                    const img = document.createElement('img');
                    img.src = imageUrl;
                    img.alt = `Option ${index + 1}`;
                    
                    imgButton.appendChild(img);
                    imgButton.onclick = () => selectAnswer(index);
                    optionsDiv.appendChild(imgButton);
                });
            } else {
                question.options.forEach((option, index) => {
                    const button = document.createElement('div');
                    button.className = 'option';
                    button.textContent = option;
                    button.onclick = () => selectAnswer(index);
                    optionsDiv.appendChild(button);
                });
            }

            document.getElementById('feedback').classList.remove('show');
            document.getElementById('next-btn').disabled = true;
            answered = false;
        }

        function selectAnswer(index) {
            if (answered) return;

            const question = questions[currentQuestion];
            const options = document.querySelectorAll('.option');
            const nextBtn = document.getElementById('next-btn');
            const feedback = document.getElementById('feedback');

            answered = true;

            options.forEach((opt, i) => {
                opt.classList.add('disabled');
                if (i === question.correct) {
                    opt.classList.add('correct');
                } else if (i === index) {
                    opt.classList.add('incorrect');
                }
            });

            if (index === question.correct) {
                score++;
                document.getElementById('score').textContent = score;
                feedback.textContent = '✓ Correct! Nice work!';
                feedback.classList.add('correct-feedback');
            } else {
                const correctText = question.isImageQuestion ? 'Look at the highlighted image' : question.options[question.correct];
                feedback.textContent = `✗ Oops! The correct answer is: ${correctText}`;
                feedback.classList.add('incorrect-feedback');
            }

            feedback.classList.add('show');
            nextBtn.disabled = false;
        }

        function nextQuestion() {
            const feedback = document.getElementById('feedback');
            feedback.classList.remove('show', 'correct-feedback', 'incorrect-feedback');

            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('trivia-content').style.display = 'none';
            document.getElementById('results-screen').classList.add('show');

            document.getElementById('final-score').textContent = `${score} / 11`;

            let message = '';
            if (score === 11) {
                message = "You're a SMASHLEY SUPERFAN! 🍾✨ You know EVERYTHING there is to know about this legend!";
            } else if (score >= 9) {
                message = "Wow! You're basically a Smashley expert! 🎉 You're definitely part of the inner circle!";
            } else if (score >= 7) {
                message = "Not bad! You really know Smashley pretty well! 🍾";
            } else if (score >= 5) {
                message = "You tried! Time for a margarita with Smashley to catch up! 🍹";
            } else {
                message = "Looks like you need to spend more time with Smashley! Better luck next time! 💚";
            }

            document.getElementById('results-message').textContent = message;
        }

        // Load the first question when page loads
        loadQuestion();
    </script>
</body>
</html>
